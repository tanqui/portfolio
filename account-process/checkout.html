<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500&display=swap" rel="stylesheet" />

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="env.js"></script>

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:         #ffffff;
        --fg:         #09090b;
        --muted:      #71717a;
        --border:     #e4e4e7;
        --surface:    #fafafa;
        --input-bg:   #fafafa;
        --ring:       #18181b;
        --btn-bg:     #18181b;
        --btn-fg:     #fafafa;
        --btn-hover:  #27272a;
        --btn-ghost-hover: #f4f4f5;
        --radius:     8px;
        --radius-sm:  6px;
        --font-head:  'Syne', sans-serif;
        --font-body:  'Plus Jakarta Sans', sans-serif;
        --shadow-sm:   0 1px 2px 0 rgb(0 0 0 / .05);
        --shadow-card: 0 4px 24px 0 rgb(0 0 0 / .06), 0 1px 2px 0 rgb(0 0 0 / .04);
      }

      html, body { height: 100%; font-family: var(--font-body); background: var(--bg); color: var(--fg); -webkit-font-smoothing: antialiased; }

      /* Loading overlay */
      #loadingScreen {
        position: fixed; inset: 0; background: var(--bg);
        display: grid; place-items: center; z-index: 10; transition: opacity .2s;
      }
      #loadingScreen.fade-out { opacity: 0; pointer-events: none; }
      .loader-dot { width: 8px; height: 8px; background: #d4d4d8; border-radius: 50%; display: inline-block; animation: pulse .9s ease-in-out infinite both; }
      .loader-dot:nth-child(2) { animation-delay: .15s; margin: 0 4px; }
      .loader-dot:nth-child(3) { animation-delay: .3s; }
      @keyframes pulse { 0%,80%,100%{transform:scale(.7);opacity:.4;} 40%{transform:scale(1);opacity:1;} }

      /* Layout */
      .page { min-height: 100%; display: grid; grid-template-rows: 56px 1fr; }

      /* Topbar */
      .topbar { border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
      .topbar-brand { display: flex; align-items: center; gap: 10px; }
      .logo-mark { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; background: var(--fg); border-radius: 6px; flex-shrink: 0; }
      .brand-name { font-family: var(--font-head); font-size: 15px; font-weight: 600; letter-spacing: -.2px; }
      .user-email { font-size: 13px; color: var(--muted); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

      /* Steps in topbar */
      .steps { display: flex; align-items: center; }
      .step { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; color: var(--muted); white-space: nowrap; }
      .step.active { color: var(--fg); }
      .step.done   { color: #16a34a; }
      .step-num {
        width: 20px; height: 20px; border-radius: 50%;
        border: 1.5px solid var(--border);
        display: inline-flex; align-items: center; justify-content: center;
        font-size: 11px; font-weight: 600; flex-shrink: 0;
      }
      .step.active .step-num { background: var(--fg); color: #fff; border-color: var(--fg); }
      .step.done   .step-num { background: #16a34a; color: #fff; border-color: #16a34a; }
      .step-line { width: 32px; height: 1px; background: var(--border); margin: 0 8px; }

      /* Main */
      .main { display: grid; place-items: start center; padding: 40px 24px; }

      .checkout-layout {
        width: 100%; max-width: 760px;
        display: grid;
        grid-template-columns: 1fr 320px;
        gap: 24px;
        animation: fadeUp .35s ease both;
      }
      @media (max-width: 640px) { .checkout-layout { grid-template-columns: 1fr; } }

      @keyframes fadeUp { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }

      /* Section heading */
      .section-title { font-family: var(--font-head); font-size: 14px; font-weight: 600; letter-spacing: -.1px; margin-bottom: 16px; }

      /* Card surface */
      .card {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow-card);
        padding: 24px;
      }

      /* Form fields */
      .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
      .field:last-child { margin-bottom: 0; }
      .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

      label { font-size: 13px; font-weight: 500; letter-spacing: -.1px; }

      input[type="text"],
      input[type="tel"],
      select {
        font-family: var(--font-body); font-size: 14px;
        padding: 9px 12px;
        background: var(--input-bg); border: 1px solid var(--border);
        border-radius: var(--radius-sm); color: var(--fg); outline: none; width: 100%;
        transition: border-color .15s, box-shadow .15s;
        box-shadow: var(--shadow-sm);
        -webkit-appearance: none; appearance: none;
      }
      input::placeholder { color: #a1a1aa; }
      input:focus, select:focus { border-color: var(--ring); box-shadow: 0 0 0 3px rgb(24 24 27 / .08); }

      /* Card number with icon */
      .input-icon-wrap { position: relative; }
      .input-icon-wrap input { padding-right: 40px; }
      .card-icon { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); }

      /* Divider */
      .divider { height: 1px; background: var(--border); margin: 20px 0; }

      /* Order summary */
      .order-items { display: flex; flex-direction: column; gap: 0; }
      .order-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; font-size: 13.5px; }
      .order-item + .order-item { border-top: 1px solid var(--border); }
      .item-name  { color: var(--fg); }
      .item-desc  { font-size: 12px; color: var(--muted); margin-top: 2px; }
      .item-price { font-weight: 500; white-space: nowrap; }

      .order-total { display: flex; justify-content: space-between; padding-top: 16px; border-top: 1px solid var(--border); font-weight: 600; font-family: var(--font-head); font-size: 15px; margin-top: 4px; }

      /* Secure badge */
      .secure-badge { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 12px; color: var(--muted); margin-top: 14px; }

      /* Submit button */
      .btn-submit {
        display: flex; align-items: center; justify-content: center; gap: 8px;
        width: 100%; padding: 11px 16px; margin-top: 20px;
        background: var(--btn-bg); color: var(--btn-fg);
        font-family: var(--font-body); font-size: 14px; font-weight: 500;
        border: none; border-radius: var(--radius-sm);
        cursor: pointer; transition: background .15s; letter-spacing: -.1px;
      }
      .btn-submit:hover:not(:disabled) { background: var(--btn-hover); }
      .btn-submit:disabled { opacity: .5; cursor: not-allowed; }

      .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }

      .notice { display: none; font-size: 13px; border-radius: var(--radius-sm); padding: 9px 12px; margin-bottom: 14px; line-height: 1.5; }
      .notice.error   { background: #fff1f2; color: #be123c; border: 1px solid #fecdd3; }
      .notice.visible { display: block; }
    </style>
  </head>
  <body>

    <div id="loadingScreen">
      <div><span class="loader-dot"></span><span class="loader-dot"></span><span class="loader-dot"></span></div>
    </div>

    <div class="page" id="appPage" style="display:none">

      <!-- Topbar -->
      <header class="topbar">
        <div class="topbar-brand">
          <div class="logo-mark">
            <svg width="14" height="14" viewBox="0 0 18 18" fill="none">
              <path d="M9 2L15.5 5.75V12.25L9 16L2.5 12.25V5.75L9 2Z" fill="white" stroke="white" stroke-width="1"/>
            </svg>
          </div>
          <span class="brand-name">Acme</span>
        </div>

        <div class="steps">
          <div class="step done">
            <span class="step-num">
              <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 6 5 9 10 3"/></svg>
            </span>
            Sign in
          </div>
          <div class="step-line"></div>
          <div class="step active"><span class="step-num">2</span> Checkout</div>
          <div class="step-line"></div>
          <div class="step"><span class="step-num">3</span> Account</div>
        </div>

        <span class="user-email" id="topEmail">—</span>
      </header>

      <!-- Main -->
      <main class="main">
        <div class="checkout-layout">

          <!-- Left: payment form -->
          <div>
            <p class="section-title">Payment details</p>
            <div class="card">
              <div class="notice error" id="errorNotice"></div>

              <div class="field">
                <label for="cardName">Name on card</label>
                <input type="text" id="cardName" placeholder="Jane Smith" autocomplete="cc-name" />
              </div>

              <div class="field">
                <label for="cardNumber">Card number</label>
                <div class="input-icon-wrap">
                  <input type="tel" id="cardNumber" placeholder="0000 0000 0000 0000"
                         maxlength="19" autocomplete="cc-number" oninput="fmtCard(this)" />
                  <span class="card-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                      <rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/>
                    </svg>
                  </span>
                </div>
              </div>

              <div class="field-row">
                <div class="field">
                  <label for="cardExp">Expiry</label>
                  <input type="tel" id="cardExp" placeholder="MM / YY" maxlength="7" autocomplete="cc-exp" oninput="fmtExp(this)" />
                </div>
                <div class="field">
                  <label for="cardCvc">CVC</label>
                  <input type="tel" id="cardCvc" placeholder="123" maxlength="4" autocomplete="cc-csc" />
                </div>
              </div>

              <div class="divider"></div>

              <p class="section-title" style="margin-bottom:12px">Billing address</p>

              <div class="field">
                <label for="country">Country</label>
                <select id="country">
                  <option value="">Select country…</option>
                  <option value="PT">Portugal</option>
                  <option value="ES">Spain</option>
                  <option value="FR">France</option>
                  <option value="DE">Germany</option>
                  <option value="GB">United Kingdom</option>
                  <option value="US">United States</option>
                  <option value="other">Other</option>
                </select>
              </div>

              <div class="field">
                <label for="zip">Postal / ZIP code</label>
                <input type="text" id="zip" placeholder="1000-001" autocomplete="postal-code" />
              </div>

              <button class="btn-submit" id="payBtn" onclick="handlePay()">
                Complete purchase
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
              </button>
            </div>
          </div>

          <!-- Right: order summary -->
          <div>
            <p class="section-title">Order summary</p>
            <div class="card">
              <div class="order-items">
                <div class="order-item">
                  <div>
                    <div class="item-name">Pro Plan</div>
                    <div class="item-desc">Billed annually</div>
                  </div>
                  <div class="item-price">€79.00</div>
                </div>
                <div class="order-item">
                  <div class="item-name" style="color:var(--muted)">Discount (20%)</div>
                  <div class="item-price" style="color:#16a34a">−€15.80</div>
                </div>
                <div class="order-item">
                  <div class="item-name" style="color:var(--muted)">VAT (23%)</div>
                  <div class="item-price" style="color:var(--muted)">€14.57</div>
                </div>
              </div>
              <div class="order-total">
                <span>Total</span>
                <span>€77.77</span>
              </div>

              <div class="secure-badge">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                Secured with 256-bit encryption
              </div>
            </div>
          </div>

        </div>
      </main>
    </div>

    <script>
      const { createClient } = supabase;
      const _supabase = createClient(window.ENV.SUPABASE_URL, window.ENV.SUPABASE_ANON_KEY);

      let currentUser = null;

      // Guard: must be signed in
      (async () => {
        const { data: { session } } = await _supabase.auth.getSession();
        if (!session) { window.location.replace("index.html"); return; }
        currentUser = session.user;
        document.getElementById("topEmail").textContent = currentUser.email || "—";
        reveal();
      })();

      _supabase.auth.onAuthStateChange((event) => {
        if (event === "SIGNED_OUT") window.location.replace("index.html");
      });

      function reveal() {
        document.getElementById("loadingScreen").classList.add("fade-out");
        document.getElementById("appPage").style.display = "grid";
        setTimeout(() => document.getElementById("loadingScreen").remove(), 250);
      }

      // ── Input formatters ──────────────────────────────────────────────
      function fmtCard(el) {
        let v = el.value.replace(/\D/g, "").slice(0, 16);
        el.value = v.match(/.{1,4}/g)?.join(" ") ?? v;
      }
      function fmtExp(el) {
        let v = el.value.replace(/\D/g, "").slice(0, 4);
        if (v.length >= 3) v = v.slice(0,2) + " / " + v.slice(2);
        el.value = v;
      }

      // ── Handle pay ────────────────────────────────────────────────────
      async function handlePay() {
        const name    = document.getElementById("cardName").value.trim();
        const number  = document.getElementById("cardNumber").value.replace(/\s/g, "");
        const exp     = document.getElementById("cardExp").value.replace(/\s/g, "");
        const cvc     = document.getElementById("cardCvc").value.trim();
        const country = document.getElementById("country").value;
        const zip     = document.getElementById("zip").value.trim();

        if (!name || number.length < 16 || exp.length < 4 || cvc.length < 3 || !country || !zip) {
          showError("Please fill in all required fields."); return;
        }

        hideError();
        const btn = document.getElementById("payBtn");
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Processing…';

        // ─────────────────────────────────────────────────────────────────
        // Wire your real payment processor here (e.g. Stripe.js).
        // On success, store the order in Supabase, then redirect below.
        // ─────────────────────────────────────────────────────────────────
        await new Promise(r => setTimeout(r, 1800)); // simulated delay

        window.location.replace("account.html");
      }

      function showError(msg) {
        const el = document.getElementById("errorNotice");
        el.textContent = msg; el.classList.add("visible");
      }
      function hideError() {
        const el = document.getElementById("errorNotice");
        el.textContent = ""; el.classList.remove("visible");
      }
    </script>
  </body>
</html>
