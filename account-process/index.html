<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500&display=swap" rel="stylesheet" />

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="env.js"></script>

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:        #ffffff;
        --fg:        #09090b;
        --muted:     #71717a;
        --border:    #e4e4e7;
        --input-bg:  #fafafa;
        --ring:      #18181b;
        --btn-bg:    #18181b;
        --btn-fg:    #fafafa;
        --btn-hover: #27272a;
        --radius:    8px;
        --radius-sm: 6px;
        --font-head: 'Syne', sans-serif;
        --font-body: 'Plus Jakarta Sans', sans-serif;
        --shadow-sm:   0 1px 2px 0 rgb(0 0 0 / .05);
        --shadow-card: 0 4px 24px 0 rgb(0 0 0 / .06), 0 1px 2px 0 rgb(0 0 0 / .04);
      }

      html, body { height: 100%; font-family: var(--font-body); background: var(--bg); color: var(--fg); -webkit-font-smoothing: antialiased; }

      .page { min-height: 100%; display: grid; place-items: center; padding: 24px; }

      .card {
        width: 100%; max-width: 380px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow-card);
        padding: 32px;
      }

      /* Steps */
      .steps { display: flex; align-items: center; margin-bottom: 28px; }
      .step { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; color: var(--muted); white-space: nowrap; }
      .step.active { color: var(--fg); }
      .step-num {
        width: 20px; height: 20px; border-radius: 50%;
        border: 1.5px solid var(--border);
        display: inline-flex; align-items: center; justify-content: center;
        font-size: 11px; font-weight: 600; flex-shrink: 0;
      }
      .step.active .step-num { background: var(--fg); color: #fff; border-color: var(--fg); }
      .step-line { flex: 1; height: 1px; background: var(--border); margin: 0 8px; }

      /* Logo */
      .logo {
        display: inline-flex; align-items: center; justify-content: center;
        width: 36px; height: 36px; background: var(--fg); border-radius: 8px;
        margin-bottom: 24px;
      }

      .card-title { font-family: var(--font-head); font-size: 18px; font-weight: 600; letter-spacing: -.3px; margin-bottom: 6px; }
      .card-desc { font-size: 13.5px; color: var(--muted); line-height: 1.55; margin-bottom: 24px; }

      /* Form */
      .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
      label { font-size: 13px; font-weight: 500; letter-spacing: -.1px; }

      input[type="email"] {
        font-family: var(--font-body); font-size: 14px;
        padding: 9px 12px;
        background: var(--input-bg); border: 1px solid var(--border);
        border-radius: var(--radius-sm); color: var(--fg); outline: none; width: 100%;
        transition: border-color .15s, box-shadow .15s;
        box-shadow: var(--shadow-sm);
      }
      input[type="email"]::placeholder { color: #a1a1aa; }
      input[type="email"]:focus { border-color: var(--ring); box-shadow: 0 0 0 3px rgb(24 24 27 / .08); }

      .btn {
        display: flex; align-items: center; justify-content: center; gap: 8px;
        width: 100%; padding: 9.5px 16px;
        background: var(--btn-bg); color: var(--btn-fg);
        font-family: var(--font-body); font-size: 14px; font-weight: 500;
        border: none; border-radius: var(--radius-sm);
        cursor: pointer; transition: background .15s; margin-top: 4px; letter-spacing: -.1px;
      }
      .btn:hover:not(:disabled) { background: var(--btn-hover); }
      .btn:disabled { opacity: .5; cursor: not-allowed; }

      .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }

      .notice { display: none; font-size: 13px; border-radius: var(--radius-sm); padding: 9px 12px; margin-bottom: 14px; line-height: 1.5; }
      .notice.error   { background: #fff1f2; color: #be123c; border: 1px solid #fecdd3; }
      .notice.visible { display: block; }

      /* Sent state */
      .sent-view { display: none; text-align: center; animation: fadeUp .3s ease both; }
      .sent-view.visible { display: block; }
      .form-view.hidden { display: none; }

      .sent-icon { display: inline-flex; align-items: center; justify-content: center; width: 48px; height: 48px; background: #f4f4f5; border-radius: 50%; margin-bottom: 16px; }
      .sent-title { font-family: var(--font-head); font-size: 17px; font-weight: 600; margin-bottom: 8px; letter-spacing: -.2px; }
      .sent-body  { font-size: 13.5px; color: var(--muted); line-height: 1.6; margin-bottom: 24px; }
      .sent-email { color: var(--fg); font-weight: 500; }

      .link-btn { background: none; border: none; cursor: pointer; font-family: var(--font-body); font-size: 13.5px; color: var(--muted); text-decoration: underline; text-underline-offset: 2px; padding: 0; transition: color .15s; }
      .link-btn:hover { color: var(--fg); }

      .divider { height: 1px; background: var(--border); margin: 24px 0; }
      .card-footer { font-size: 12px; color: var(--muted); text-align: center; line-height: 1.6; }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="card">

        <!-- Step indicator -->
        <div class="steps">
          <div class="step active"><span class="step-num">1</span> Sign in</div>
          <div class="step-line"></div>
          <div class="step"><span class="step-num">2</span> Checkout</div>
          <div class="step-line"></div>
          <div class="step"><span class="step-num">3</span> Account</div>
        </div>

        <!-- Logo -->
        <div class="logo">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M9 2L15.5 5.75V12.25L9 16L2.5 12.25V5.75L9 2Z" fill="white" stroke="white" stroke-width="1"/>
          </svg>
        </div>

        <!-- Form view -->
        <div class="form-view" id="formView">
          <h1 class="card-title">Sign in to continue</h1>
          <p class="card-desc">Enter your email and we'll send you a magic link â€” no password needed.</p>

          <div class="notice error" id="errorNotice"></div>

          <div class="field">
            <label for="email">Email address</label>
            <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
          </div>

          <button class="btn" id="submitBtn" onclick="handleSubmit()">Send magic link</button>

          <div class="divider"></div>
          <p class="card-footer">By continuing you agree to our Terms&nbsp;of&nbsp;Service and Privacy&nbsp;Policy.</p>
        </div>

        <!-- Sent view -->
        <div class="sent-view" id="sentView">
          <div class="sent-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#18181b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
          </div>
          <p class="sent-title">Check your inbox</p>
          <p class="sent-body">We sent a magic link to<br/><span class="sent-email" id="sentEmail"></span></p>
          <button class="link-btn" onclick="resetForm()">Use a different email</button>
        </div>

      </div>
    </div>

    <script>
      const { createClient } = supabase;
      const _supabase = createClient(window.ENV.SUPABASE_URL, window.ENV.SUPABASE_ANON_KEY);

      // Already signed in â†’ use stored intent or fall back to account
      (async () => {
        const { data: { session } } = await _supabase.auth.getSession();
        if (session) window.location.replace(storedDestination());
      })();

      // Magic-link callback â†’ read the destination we stored before sending
      _supabase.auth.onAuthStateChange((event, session) => {
        if (event === "SIGNED_IN" && session) {
          window.location.replace(storedDestination());
        }
      });

      /**
       * Returns the redirect target that was stored in sessionStorage
       * when the user clicked "Send magic link".
       * Falls back to account.html if nothing is stored (e.g. direct navigation).
       */
      function storedDestination() {
        const dest = sessionStorage.getItem("authDestination") || "account.html";
        sessionStorage.removeItem("authDestination");
        return dest;
      }

      async function handleSubmit() {
        const email = document.getElementById("email").value.trim();
        const btn   = document.getElementById("submitBtn");

        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          showError("Please enter a valid email address."); return;
        }

        hideError();
        setLoading(btn, true);

        // Check if this email already has a profile â†’ determines post-login destination
        const { data: profile } = await _supabase
          .from("profiles")
          .select("id")
          .eq("email", email)
          .maybeSingle();

        const destination = profile ? "account.html" : "checkout.html";
        sessionStorage.setItem("authDestination", destination);

        // The magic link itself always lands back on this page so the
        // onAuthStateChange handler above can fire and read sessionStorage.
        const redirectTo = window.location.origin
          + window.location.pathname.replace(/index\.html$/, "")
          + "index.html";

        const { error } = await _supabase.auth.signInWithOtp({
          email,
          options: { emailRedirectTo: redirectTo },
        });

        setLoading(btn, false);

        if (error) {
          sessionStorage.removeItem("authDestination");
          showError(error.message || "Something went wrong."); return;
        }

        document.getElementById("sentEmail").textContent = email;
        document.getElementById("formView").classList.add("hidden");
        document.getElementById("sentView").classList.add("visible");
      }

      function resetForm() {
        document.getElementById("sentView").classList.remove("visible");
        document.getElementById("formView").classList.remove("hidden");
        document.getElementById("email").value = "";
        hideError();
      }

      function setLoading(btn, on) {
        btn.disabled = on;
        btn.innerHTML = on ? '<span class="spinner"></span> Sendingâ€¦' : "Send magic link";
      }
      function showError(msg) {
        const el = document.getElementById("errorNotice");
        el.textContent = msg; el.classList.add("visible");
      }
      function hideError() {
        const el = document.getElementById("errorNotice");
        el.textContent = ""; el.classList.remove("visible");
      }

      document.getElementById("email").addEventListener("keydown", e => {
        if (e.key === "Enter") handleSubmit();
      });
    </script>
  </body>
</html>
